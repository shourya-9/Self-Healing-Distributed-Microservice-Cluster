global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8000']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8000']

  - job_name: "ai-orchestrator"
    static_configs:
      - targets: ["ai-orchestrator:8003"]
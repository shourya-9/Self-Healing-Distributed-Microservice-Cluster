services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8000"
    restart: always

  order-service:
    build: ./services/order-service
    ports:
      - "8002:8000"
    depends_on:
      - auth-service
    restart: always

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always

  ai-orchestrator:
    build: ./ai-orchestrator
    ports:
      - "8003:8003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - prometheus
      - auth-service
    restart: always

volumes:
  grafana-data: